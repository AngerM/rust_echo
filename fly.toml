# fly.toml file for falling-feather-6822
# Optimized for a Rust Salvo web server

app = "falling-feather-6822"
primary_region = "dfw"
kill_signal = "SIGINT"
kill_timeout = "20s"

[experimental]
  auto_rollback = true

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "2s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "2s"
