# fly.toml app configuration file generated for falling-feather-6822 on 2026-07-01T17:47:53Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "falling-feather-6822"
primary_region = "dfw"
kill_signal = "SIGINT"
kill_timeout = "20s"

[experimental]
  auto_rollback = true

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "2s"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '256mb'
  memory_mb = 256
  processes = ['app']
  size = 'shared-cpu-1x'
